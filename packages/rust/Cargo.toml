[package]
name = "qorechain-sdk"
version = "0.3.0"
edition = "2021"
license = "Apache-2.0"
description = "QoreChain SDK for Rust: networks, denom/address utils, HD accounts (native/EVM/SVM), ML-DSA-87 PQC signing, typed messages for all custom modules, tx lifecycle (auto-gas, tracking, search), typed queries, WS subscriptions, and REST/JSON-RPC read clients."
repository = "https://github.com/qorechain/qorechain-sdk"
homepage = "https://github.com/qorechain/qorechain-sdk"
keywords = ["qorechain", "blockchain", "pqc", "ml-dsa", "wallet"]
categories = ["cryptography", "api-bindings"]
readme = "README.md"
rust-version = "1.74"

# Published as `qorechain-sdk`; imported as `qorechain` (e.g. `use qorechain::...`).
[lib]
name = "qorechain"

[dependencies]
# Mnemonics & HD derivation
bip39 = "2"
k256 = { version = "0.13", features = ["ecdsa"] }
ed25519-dalek = "2"
rand_core = { version = "0.6", features = ["getrandom"] }
# Hashing
sha2 = "0.10"
sha3 = "0.10"
ripemd = "0.1"
hmac = "0.12"
# Encodings
bech32 = "0.11"
bs58 = "0.5"
hex = "0.4"
base64 = "0.22"
# PQC: FIPS 204 ML-DSA-87
fips204 = "0.4"
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Errors
thiserror = "2"
# Async HTTP
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "time"] }
cosmrs = { version = "0.22.0", features = ["cosmwasm"] }
# Protobuf: prost types for the generated QoreChain custom-module messages
# (pinned to the line cosmos-sdk-proto / cosmrs use so the generated types and
# the re-exported Cosmos types share one prost runtime).
prost = "0.13"
# WebSocket subscriptions to the chain RPC /websocket endpoint.
tokio-tungstenite = { version = "0.24", default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "net", "io-util", "time"] }
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
