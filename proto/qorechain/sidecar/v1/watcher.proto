syntax = "proto3";
package qorechain.sidecar.v1;

option go_package = "github.com/qorechain/qorechain-core/sidecar/proto/sidecar/v1";

service WatcherService {
  rpc ReportEvent(stream ChainEvent) returns (stream EventAck);
  rpc SubscribeTasks(TaskSubscription) returns (stream WatchTask);
}

message ChainEvent {
  string chain_id = 1;
  string event_type = 2;
  string tx_hash = 3;
  string sender = 4;
  string receiver = 5;
  string amount = 6;
  string asset = 7;
  uint64 block_height = 8;
  uint64 confirmations = 9;
  bytes  proof = 10;
  int64  timestamp = 11;
}

message EventAck {
  string event_id = 1;
  bool   accepted = 2;
  string reason = 3;
}

message TaskSubscription {
  string chain_id = 1;
  string sidecar_id = 2;
}

message WatchTask {
  string task_id = 1;
  string task_type = 2;
  string chain_id = 3;
  map<string, string> params = 4;
}
