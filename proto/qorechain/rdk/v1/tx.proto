syntax = "proto3";
package qorechain.rdk.v1;

option go_package = "github.com/qorechain/qorechain-core/x/rdk/types";

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

// Msg defines the rdk module's transaction service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc CreateRollup(MsgCreateRollup) returns (MsgCreateRollupResponse);
  rpc SubmitBatch(MsgSubmitBatch) returns (MsgSubmitBatchResponse);
  rpc ChallengeBatch(MsgChallengeBatch) returns (MsgChallengeBatchResponse);
  rpc ResolveChallenge(MsgResolveChallenge) returns (MsgResolveChallengeResponse);
  rpc PauseRollup(MsgPauseRollup) returns (MsgPauseRollupResponse);
  rpc ResumeRollup(MsgResumeRollup) returns (MsgResumeRollupResponse);
  rpc StopRollup(MsgStopRollup) returns (MsgStopRollupResponse);
  rpc ExecuteWithdrawal(MsgExecuteWithdrawal) returns (MsgExecuteWithdrawalResponse);
}

message MsgCreateRollup {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string rollup_id = 2 [(gogoproto.customname) = "RollupID"];
  string profile = 3;
  string vm_type = 4;
  int64 stake_amount = 5;
}
message MsgCreateRollupResponse {
  string rollup_id = 1 [(gogoproto.customname) = "RollupID"];
}

message MsgSubmitBatch {
  option (cosmos.msg.v1.signer) = "sequencer";
  string sequencer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string rollup_id = 2 [(gogoproto.customname) = "RollupID"];
  uint64 batch_index = 3;
  bytes state_root = 4;
  bytes prev_state_root = 5;
  uint64 tx_count = 6;
  bytes data_hash = 7;
  bytes proof = 8;
  // withdrawals_root commits the L2->L1 messages (withdrawals) in this batch as
  // a binary Merkle root. Empty when the batch carries no cross-layer messages.
  bytes withdrawals_root = 9;
}
message MsgSubmitBatchResponse {}

message MsgChallengeBatch {
  option (cosmos.msg.v1.signer) = "challenger";
  string challenger = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string rollup_id = 2 [(gogoproto.customname) = "RollupID"];
  uint64 batch_index = 3;
  bytes proof = 4;
}
message MsgChallengeBatchResponse {}

message MsgResolveChallenge {
  option (cosmos.msg.v1.signer) = "resolver";
  string resolver = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string rollup_id = 2 [(gogoproto.customname) = "RollupID"];
  uint64 batch_index = 3;
  // fraud_upheld true: fraud confirmed -> batch rejected, challenger refunded +
  // rewarded from rollup stake. false: challenge dismissed -> challenger bond
  // forfeited to the rollup operator, batch eligible for finalization.
  bool fraud_upheld = 4;
}
message MsgResolveChallengeResponse {}

message MsgPauseRollup {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string rollup_id = 2 [(gogoproto.customname) = "RollupID"];
  string reason = 3;
}
message MsgPauseRollupResponse {}

message MsgResumeRollup {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string rollup_id = 2 [(gogoproto.customname) = "RollupID"];
}
message MsgResumeRollupResponse {}

message MsgStopRollup {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string rollup_id = 2 [(gogoproto.customname) = "RollupID"];
}
message MsgStopRollupResponse {}

// MsgExecuteWithdrawal finalizes an L2->L1 cross-layer message: it proves a
// withdrawal leaf is committed in a finalized batch's withdrawals_root and pays
// the recipient from the rdk module escrow. Permissionless — anyone may submit a
// valid proof; the funds always go to the committed recipient. Replay-protected
// per (rollup_id, batch_index, withdrawal_index).
message MsgExecuteWithdrawal {
  option (cosmos.msg.v1.signer) = "submitter";
  string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string rollup_id = 2 [(gogoproto.customname) = "RollupID"];
  uint64 batch_index = 3;
  uint64 withdrawal_index = 4;
  string recipient = 5 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string denom = 6;
  int64 amount = 7;
  // proof are the binary-Merkle sibling hashes from the leaf to withdrawals_root.
  repeated bytes proof = 8;
}
message MsgExecuteWithdrawalResponse {}
