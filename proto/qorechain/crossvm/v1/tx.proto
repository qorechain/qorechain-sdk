syntax = "proto3";
package qorechain.crossvm.v1;

option go_package = "github.com/qorechain/qorechain-core/x/crossvm/types";

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

// Msg defines the crossvm module's transaction service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // CrossVMCall submits a cross-VM message to the queue.
  rpc CrossVMCall(MsgCrossVMCall) returns (MsgCrossVMCallResponse);

  // ProcessQueue processes the pending cross-VM message queue.
  rpc ProcessQueue(MsgProcessQueue) returns (MsgProcessQueueResponse);
}

message MsgCrossVMCall {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string source_vm = 2 [(gogoproto.casttype) = "VMType", (gogoproto.customname) = "SourceVM"];
  string target_vm = 3 [(gogoproto.casttype) = "VMType", (gogoproto.customname) = "TargetVM"];
  string target_contract = 4;
  bytes payload = 5;
  repeated cosmos.base.v1beta1.Coin funds = 6 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
}
message MsgCrossVMCallResponse {
  string message_id = 1 [(gogoproto.customname) = "MessageID"];
}

message MsgProcessQueue {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}
message MsgProcessQueueResponse {}
