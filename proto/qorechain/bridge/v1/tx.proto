syntax = "proto3";
package qorechain.bridge.v1;

option go_package = "github.com/qorechain/qorechain-core/x/bridge/types";

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

// Msg defines the bridge module's transaction service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // BridgeDeposit credits assets bridged in from a source chain.
  rpc BridgeDeposit(MsgBridgeDeposit) returns (MsgBridgeDepositResponse);

  // BridgeWithdraw initiates a withdrawal to a destination chain.
  rpc BridgeWithdraw(MsgBridgeWithdraw) returns (MsgBridgeWithdrawResponse);

  // RegisterBridgeValidator registers a validator for bridge attestation duty.
  rpc RegisterBridgeValidator(MsgRegisterBridgeValidator) returns (MsgRegisterBridgeValidatorResponse);

  // BridgeAttestation submits a validator attestation for a bridge operation.
  rpc BridgeAttestation(MsgBridgeAttestation) returns (MsgBridgeAttestationResponse);

  // UpdateEthLightClient advances the on-chain Ethereum light client with a
  // verified Altair LightClientUpdate (carried as an opaque encoded bundle).
  rpc UpdateEthLightClient(MsgUpdateEthLightClient) returns (MsgUpdateEthLightClientResponse);

  // UpdateChainConfig registers/updates a chain's bridge config — real contract
  // address, confirmations, architecture, status, and which trustless verifier
  // is active. Authorized by the bridge_admin key OR a qcb_bridge license; lets
  // operators activate a chain's bridge POST-DEPLOY without governance or an
  // upgrade.
  rpc UpdateChainConfig(MsgUpdateChainConfig) returns (MsgUpdateChainConfigResponse);

  // SetVerifierBootstrap installs the per-architecture trust root a chain's
  // trustless verifier needs (Wormhole guardian set / ed25519 or BLS validator
  // quorum / Bitcoin checkpoint / Starknet state root). Same authorization as
  // UpdateChainConfig. (Ethereum uses UpdateEthLightClient.)
  rpc SetVerifierBootstrap(MsgSetVerifierBootstrap) returns (MsgSetVerifierBootstrapResponse);
}

// MsgUpdateChainConfig sets/replaces a chain's bridge configuration. Empty
// string / zero fields fall back to the existing config (merge semantics in the
// handler), so a caller can flip just `status`+one verifier flag to activate.
message MsgUpdateChainConfig {
  option (cosmos.msg.v1.signer) = "admin";

  string admin = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string chain_id = 2;
  string bridge_contract = 3;          // contract/program address on the external chain
  uint32 confirmations_required = 4;
  string architecture = 5;             // ChainArchitecture string (empty keeps existing)
  string status = 6;                   // "active" | "paused" | "pending" (empty keeps existing)
  // Exactly one verifier flag should be set when activating trustless mode.
  string verifier = 7;                 // "light_client"|"wormhole"|"ed25519"|"bls"|"starknet"|"bitcoin_spv"|"" (none)
  string lock_event_sig = 8;           // hex topic0 of the lock event (EVM/light-client chains)
}
message MsgUpdateChainConfigResponse {}

// MsgSetVerifierBootstrap installs a verifier trust root. Exactly one of the
// sub-messages must be populated; the handler routes by which is non-nil.
message MsgSetVerifierBootstrap {
  option (cosmos.msg.v1.signer) = "admin";

  string admin = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string chain_id = 2;

  WormholeGuardianSet wormhole = 3;
  ValidatorQuorum ed25519 = 4;
  ValidatorQuorum bls = 5;
  BitcoinCheckpoint bitcoin = 6;
  bytes starknet_state_root = 7;
}
message MsgSetVerifierBootstrapResponse {}

message WormholeGuardianSet {
  repeated bytes addresses = 1;        // 20-byte guardian eth addresses
  uint32 quorum = 2;
}
message ValidatorQuorum {
  repeated bytes pubkeys = 1;          // ed25519 (32B) or BLS (48B) pubkeys
  uint32 threshold = 2;
}
message BitcoinCheckpoint {
  bytes block_hash = 1;
  uint32 min_confs = 2;
}

message MsgBridgeDeposit {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string source_chain = 2;
  string source_tx_hash = 3;
  string asset = 4;
  string amount = 5;
  bytes bridge_validator_sigs = 6;
  bytes pqc_commitment = 7 [(gogoproto.customname) = "PQCCommitment"];
}
message MsgBridgeDepositResponse {}

message MsgBridgeWithdraw {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string destination_chain = 2;
  string destination_address = 3;
  string asset = 4;
  string amount = 5;
}
message MsgBridgeWithdrawResponse {}

message MsgRegisterBridgeValidator {
  option (cosmos.msg.v1.signer) = "validator_address";

  string validator_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes pqc_pubkey = 2 [(gogoproto.customname) = "PQCPubkey"];
  repeated string supported_chains = 3;
}
message MsgRegisterBridgeValidatorResponse {}

message MsgBridgeAttestation {
  option (cosmos.msg.v1.signer) = "validator";

  string validator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string chain = 2;
  string event_type = 3;
  string operation_id = 4 [(gogoproto.customname) = "OperationID"];
  string tx_hash = 5;
  string amount = 6 [(gogoproto.customtype) = "cosmossdk.io/math.Int", (gogoproto.nullable) = false];
  string asset = 7;
  bytes proof = 8;
  bytes pqc_signature = 9 [(gogoproto.customname) = "PQCSignature"];
}
message MsgBridgeAttestationResponse {}

message MsgUpdateEthLightClient {
  option (cosmos.msg.v1.signer) = "relayer";

  string relayer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Encoded Altair LightClientUpdate bundle verified against the stored sync
  // committee before advancing the on-chain light client.
  bytes update = 2;
}
message MsgUpdateEthLightClientResponse {}
