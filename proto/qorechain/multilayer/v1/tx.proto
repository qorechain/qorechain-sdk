syntax = "proto3";
package qorechain.multilayer.v1;

option go_package = "github.com/qorechain/qorechain-core/x/multilayer/types";

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc RegisterSidechain(MsgRegisterSidechain) returns (MsgRegisterSidechainResponse);
  rpc RegisterPaychain(MsgRegisterPaychain) returns (MsgRegisterPaychainResponse);
  rpc AnchorState(MsgAnchorState) returns (MsgAnchorStateResponse);
  rpc RouteTransaction(MsgRouteTransaction) returns (MsgRouteTransactionResponse);
  rpc UpdateLayerStatus(MsgUpdateLayerStatus) returns (MsgUpdateLayerStatusResponse);
  rpc ChallengeAnchor(MsgChallengeAnchor) returns (MsgChallengeAnchorResponse);
}

message MsgRegisterSidechain {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string layer_id = 2 [(gogoproto.customname) = "LayerID"];
  string description = 3;
  uint64 target_block_time_ms = 4;
  uint64 max_transactions_per_block = 5;
  uint32 min_validators = 6;
  uint64 settlement_interval_blocks = 7;
  repeated string supported_vm_types = 8 [(gogoproto.customname) = "SupportedVMTypes"];
  repeated string supported_domains = 9;
}
message MsgRegisterSidechainResponse {
  string layer_id = 1 [(gogoproto.customname) = "LayerID"];
  string chain_id = 2 [(gogoproto.customname) = "ChainID"];
  string status = 3 [(gogoproto.casttype) = "LayerStatus"];
}

message MsgRegisterPaychain {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string layer_id = 2 [(gogoproto.customname) = "LayerID"];
  string description = 3;
  uint64 max_transactions_per_block = 4;
  uint64 settlement_interval_blocks = 5;
  string base_fee_multiplier = 6;
}
message MsgRegisterPaychainResponse {
  string layer_id = 1 [(gogoproto.customname) = "LayerID"];
  string status = 2 [(gogoproto.casttype) = "LayerStatus"];
}

message MsgAnchorState {
  option (cosmos.msg.v1.signer) = "relayer";
  string relayer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string layer_id = 2 [(gogoproto.customname) = "LayerID"];
  uint64 layer_height = 3;
  bytes state_root = 4;
  bytes validator_set_hash = 5;
  bytes pqc_aggregate_signature = 6 [(gogoproto.customname) = "PQCAggregateSignature"];
  uint64 transaction_count = 7;
  bytes compressed_state_proof = 8;
}
message MsgAnchorStateResponse {
  uint64 main_chain_height = 1;
  bool accepted = 2;
}

message MsgRouteTransaction {
  option (cosmos.msg.v1.signer) = "sender";
  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes transaction_payload = 2;
  string preferred_layer = 3;
  uint64 max_latency_ms = 4;
  string max_fee = 5;
}
message MsgRouteTransactionResponse {
  string selected_layer = 1;
  string reason = 2;
  string cross_layer_message_id = 3 [(gogoproto.customname) = "CrossLayerMessageID"];
}

message MsgUpdateLayerStatus {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string layer_id = 2 [(gogoproto.customname) = "LayerID"];
  string new_status = 3 [(gogoproto.casttype) = "LayerStatus"];
  string reason = 4;
}
message MsgUpdateLayerStatusResponse {}

message MsgChallengeAnchor {
  option (cosmos.msg.v1.signer) = "challenger";
  string challenger = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string layer_id = 2 [(gogoproto.customname) = "LayerID"];
  uint64 anchor_height = 3;
  bytes fraud_proof = 4;
  string challenge_reason = 5;
}
message MsgChallengeAnchorResponse {
  bool challenge_accepted = 1;
  string resolution = 2;
}
